<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Vivah Verse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Outfit:wght@400;500;600;700&family=Parisienne&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<style>
  .auth-wrap { min-height: calc(100vh - 84px); display: flex; align-items: center; justify-content: center; padding: var(--space-lg) 1rem; }
  .auth-card { width: 100%; max-width: 420px; }
  .auth-head { text-align: center; margin-bottom: 1.6rem; }
  .auth-switch { text-align: center; margin-top: 1.4rem; font-size: 0.92rem; color: var(--ink-soft); }
</style>
</head>
<body>

<nav class="navbar">
  <div class="wrap">
    <a href="index.html" class="nav-logo"><span class="flower">🌸</span> Vivah Verse</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="listings.html">Find Vendors</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions" id="nav-auth-slot"></div>
    <button class="nav-toggle">☰</button>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="form-card reveal visible">
      <div class="auth-head">
        <span class="eyebrow center">Welcome Back</span>
        <h1 style="font-size: 2rem; margin-top: 0.6rem;">Log in</h1>
      </div>

      <div class="form-banner" id="form-banner"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
          <div class="form-error" id="email-error"></div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
          <div class="form-error" id="password-error"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Log in</button>
      </form>

      <div class="auth-switch">
        New to Vivah Verse? <a href="signup.html" style="color: var(--wine); font-weight: 600;">Create an account</a>
      </div>
    </div>
  </div>
</div>

<script src="../shared/main.js"></script>
<script src="../shared/api.js"></script>
<script>
  // If already logged in, bounce straight to the right dashboard.
  (() => {
    const user = getUser();
    if (user) window.location.href = dashboardUrlForRole(user.role);
  })();

  const form = document.getElementById('login-form');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearFieldError('email');
    clearFieldError('password');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email) { showFieldError('email', 'Email is required'); return; }
    if (!password) { showFieldError('password', 'Password is required'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Logging in…';

    try {
      const data = await api.login(email, password);
      setSession(data.access_token, data.user);
      const params = new URLSearchParams(window.location.search);
      const returnTo = params.get('returnTo');
      // Only honor returnTo if it's a same-role-appropriate page; otherwise go to dashboard.
      window.location.href = returnTo && returnTo !== 'login.html' && returnTo !== 'signup.html'
        ? returnTo
        : dashboardUrlForRole(data.user.role);
    } catch (err) {
      showBanner('form-banner', err.message || 'Could not log in. Check your details and try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Log in';
    }
  });
</script>
</body>
</html>
