<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Vivah Verse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Outfit:wght@400;500;600;700&family=Parisienne&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .auth-wrap { min-height: calc(100vh - 84px); display: flex; align-items: center; justify-content: center; padding: var(--space-lg) 1rem; }
  .auth-card { width: 100%; max-width: 460px; }
  .auth-head { text-align: center; margin-bottom: 1.6rem; }
  .auth-switch { text-align: center; margin-top: 1.4rem; font-size: 0.92rem; color: var(--ink-soft); }
  .role-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin-bottom: 1.4rem; }
  .role-option { border: 1.5px solid rgba(90,30,58,0.15); border-radius: var(--radius-sm); padding: 0.9rem; text-align: center; cursor: pointer; transition: all 0.2s ease; }
  .role-option .r-icon { font-size: 1.4rem; display: block; margin-bottom: 0.3rem; }
  .role-option .r-label { font-weight: 600; font-size: 0.9rem; }
  .role-option .r-sub { font-size: 0.75rem; color: var(--ink-soft); }
  .role-option.selected { border-color: var(--wine); background: var(--blush); }
  .role-option input { position: absolute; opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="wrap">
    <a href="index.html" class="nav-logo"><span class="flower">🌸</span> Vivah Verse</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="listings.html">Find Vendors</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions" id="nav-auth-slot"></div>
    <button class="nav-toggle">☰</button>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="form-card reveal visible">
      <div class="auth-head">
        <span class="eyebrow center">Join Vivah Verse</span>
        <h1 style="font-size: 2rem; margin-top: 0.6rem;">Create your account</h1>
      </div>

      <div class="form-banner" id="form-banner"></div>

      <form id="signup-form" novalidate>
        <div class="role-toggle" id="role-toggle">
          <label class="role-option" data-role="customer">
            <input type="radio" name="role" value="customer" checked>
            <span class="r-icon">💍</span>
            <span class="r-label">I'm planning a wedding</span>
            <span class="r-sub">Find & book vendors</span>
          </label>
          <label class="role-option" data-role="vendor">
            <input type="radio" name="role" value="vendor">
            <span class="r-icon">🏪</span>
            <span class="r-label">I'm a vendor</span>
            <span class="r-sub">List my business</span>
          </label>
        </div>

        <div class="field">
          <label for="full_name">Full name</label>
          <input type="text" id="full_name" required autocomplete="name">
          <div class="form-error" id="full_name-error"></div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" required autocomplete="email">
            <div class="form-error" id="email-error"></div>
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="10-digit mobile" autocomplete="tel">
            <div class="form-error" id="phone-error"></div>
          </div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="new-password" minlength="6">
          <div class="form-error" id="password-error"></div>
        </div>
        <div class="field">
          <label for="confirm_password">Confirm password</label>
          <input type="password" id="confirm_password" required autocomplete="new-password" minlength="6">
          <div class="form-error" id="confirm_password-error"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Create account</button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="login.html" style="color: var(--wine); font-weight: 600;">Log in</a>
      </div>
    </div>
  </div>
</div>

<script src="main.js"></script>
<script src="api.js"></script>
<script>
  (() => {
    const user = getUser();
    if (user) window.location.href = dashboardUrlForRole(user.role);
  })();

  // Pre-select role from ?role=vendor (used by "List Your Business" links)
  const urlParams = new URLSearchParams(window.location.search);
  const presetRole = urlParams.get('role');

  const roleOptions = document.querySelectorAll('.role-option');
  function syncRoleUI() {
    roleOptions.forEach(opt => {
      const input = opt.querySelector('input');
      opt.classList.toggle('selected', input.checked);
    });
  }
  roleOptions.forEach(opt => {
    opt.addEventListener('click', () => {
      opt.querySelector('input').checked = true;
      syncRoleUI();
    });
  });
  if (presetRole === 'vendor') {
    document.querySelector('input[value="vendor"]').checked = true;
  }
  syncRoleUI();

  const form = document.getElementById('signup-form');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    ['full_name', 'email', 'phone', 'password', 'confirm_password'].forEach(clearFieldError);

    const full_name = document.getElementById('full_name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm_password = document.getElementById('confirm_password').value;
    const role = document.querySelector('input[name="role"]:checked').value;

    let hasError = false;
    if (!full_name) { showFieldError('full_name', 'Please enter your name'); hasError = true; }
    if (!email) { showFieldError('email', 'Email is required'); hasError = true; }
    if (password.length < 6) { showFieldError('password', 'At least 6 characters'); hasError = true; }
    if (confirm_password !== password) { showFieldError('confirm_password', 'Passwords do not match'); hasError = true; }
    if (hasError) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';

    try {
      const data = await api.register({ full_name, email, phone: phone || null, password, role });
      setSession(data.access_token, data.user);
      window.location.href = dashboardUrlForRole(data.user.role);
    } catch (err) {
      showBanner('form-banner', err.message || 'Could not create your account. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create account';
    }
  });
</script>
</body>
</html>
